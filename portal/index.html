<!DOCTYPE html>
<html lang="ru">

<head>

<title>Захожье — портал проекта</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(120deg,#e9f0ff,#f6f8ff,#eef2ff);
}

/* HEADER */

.header{
text-align:center;
padding:40px 20px;
}

.header h1{
margin:0;
font-size:36px;
}

.header p{
color:#555;
margin-top:8px;
}

/* MENU GRID */

.menu{

max-width:1100px;
margin:auto;

display:grid;
grid-template-columns:repeat(3,1fr);

gap:20px;

padding:20px;

}

.menu a{

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

background:white;

border-radius:14px;

padding:30px;

text-decoration:none;

color:#333;

font-size:18px;

box-shadow:0 8px 20px rgba(0,0,0,0.08);

transition:0.25s;

}

.menu a:hover{
transform:translateY(-5px);
}

.menu span{
font-size:32px;
margin-bottom:10px;
}

/* БОЛЬШАЯ КНОПКА ОПРОСА */

.vote-btn{

grid-column:span 3;

background:#2a5bd7;

color:white;

font-size:22px;

}

.vote-btn:hover{
background:#1e46b8;
}

/* СЧЁТЧИК */

.counter{
font-size:14px;
margin-top:8px;
opacity:0.9;
}

/* FOOTER */

.footer{
text-align:center;
padding:25px;
color:#666;
font-size:14px;
}

/* ===== АДАПТИВНОСТЬ ===== */

@media (max-width:900px){

.menu{
grid-template-columns:repeat(2,1fr);
}

.vote-btn{
grid-column:span 2;
}

}

@media (max-width:600px){

.header h1{
font-size:28px;
}

.menu{
grid-template-columns:1fr;
}

.menu a{
font-size:20px;
padding:25px;
}

.vote-btn{
grid-column:span 1;
font-size:24px;
}

}

</style>

</head>

<body>

<div class="header">

<h1 id="secret-entry">Деревня Захожье</h1>

<p>Информационный портал инициативы жителей</p>

</div>

<div class="menu">

<script>

/* ===== СЧЁТЧИК GOOGLE ===== */

const sheetID = "1lB6_E7lGqh-DiIx-x4Jy-B_z0pNWdkCvaJEftCKAjXg";

fetch(`https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`)
.then(res => res.text())
.then(data => {

    const json = JSON.parse(data.substring(47).slice(0,-2));
    const rows = json.table.rows;

    document.getElementById("counter").innerText =
    rows.length + " жителей уже приняли участие";

})
.catch(() => {
    document.getElementById("counter").innerText =
    "Опрос жителей продолжается";
});


/* ===== СКРЫТЫЙ ВХОД (УСИЛЕННЫЙ) ===== */

let taps = 0;
let lastTap = 0;

const el = document.getElementById("secret-entry");

// 👉 определяем устройство
const isMobile = window.innerWidth < 768;

// 👉 настройки
const REQUIRED_TAPS = isMobile ? 8 : 5;   // мобила сложнее
const RESET_TIME = 2000;                  // 2 сек

if(el){

    el.addEventListener("click", handleTap);
    el.addEventListener("touchstart", handleTap);

}

function handleTap(){

    const now = Date.now();

    // сброс если долго
    if(now - lastTap > RESET_TIME){
        taps = 0;
    }

    taps++;
    lastTap = now;

    console.log("tap:", taps);

    if(taps >= REQUIRED_TAPS){

        taps = 0;

        setTimeout(() => {

            const password = prompt("Введите пароль администратора");

            if(!password) return;

            fetch("/api/admin_login", {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({password})
            })
            .then(r => r.json())
            .then(data => {

                if(data.status === "ok"){
                    window.location = "/admin_panel";
                } else {
                    alert("Неверный пароль");
                }

            })
            .catch(()=>{
                alert("Ошибка соединения");
            });

        }, 100);

    }
}

</script>
