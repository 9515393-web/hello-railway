<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Деревня Захожье</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f4f6f9;
color:#222;
}

/* верхняя панель */

.header{
background:white;
padding:20px;
border-bottom:1px solid #e5e7eb;
}

.header h1{
margin:0;
font-size:22px;
}

/* основной контейнер */

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

/* блок как сообщение телеграм */

.message{

background:white;
border-radius:10px;
padding:20px;
margin-bottom:20px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);

}

/* кнопки как в боте */

.buttons{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:15px;
}

button{

padding:12px 18px;
border:none;
border-radius:6px;
background:#2ea6ff;
color:white;
cursor:pointer;
font-size:14px;

}

button:hover{
background:#1f95ec;
}

/* карта */

#map{
height:500px;
border-radius:10px;
overflow:hidden;
}

</style>

</head>

<body>

<div class="header">
<h1>Проект восстановления деревни Захожье</h1>
</div>

<div class="container">

<div class="message">

<p>

Инициативная группа проводит опрос жителей массива Захожье  
о поддержке инициативы восстановления деревни.

</p>

<p>

Для принятия решения необходимо собрать  
<b>более половины голосов жителей.</b>

</p>

<div class="buttons">

<button onclick="openSurvey()">
Пройти опрос
</button>

<button onclick="openBot()">
Telegram бот
</button>

<button onclick="openDocs()">
Документы инициативной группы
</button>

<button onclick="openChat()">
Чат жителей
</button>

</div>

</div>

<div class="message">

<h2>Карта массива Захожье</h2>

<div id="map"></div>

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([55.75, 37.6], 12)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}).addTo(map)

function openSurvey(){

window.open(
"https://docs.google.com/forms/d/e/1FAIpQLScIlQHkjAVnb1L6-Nmpsoc8vUSKXjBUK24BKQIV3phAXVJy_g/viewform",
"_blank"
)

}

function openBot(){

window.open(
"https://t.me/Recreator_info_bot",
"_blank"
)

}

function openDocs(){

alert("раздел документов будет подключен")

}

function openChat(){

window.open(
"https://t.me/ВАШ_ЧАТ",
"_blank"
)

}

</script>

</body>
</html>
