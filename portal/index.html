<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/portal/mobile.css">

<title>Захожье — портал проекта</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(120deg,#e9f0ff,#f6f8ff,#eef2ff);
}

/* HEADER */

.header{
text-align:center;
padding:40px 20px;
}

.header h1{
margin:0;
font-size:36px;
}

.header p{
color:#555;
margin-top:8px;
}

/* MENU GRID */

.menu{

max-width:1100px;
margin:auto;

display:grid;
grid-template-columns:repeat(3,1fr);

gap:20px;

padding:20px;

}

.menu a{

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

background:white;

border-radius:14px;

padding:30px;

text-decoration:none;

color:#333;

font-size:18px;

box-shadow:0 8px 20px rgba(0,0,0,0.08);

transition:0.25s;

}

.menu a:hover{
transform:translateY(-5px);
}

.menu span{
font-size:32px;
margin-bottom:10px;
}

/* БОЛЬШАЯ КНОПКА ОПРОСА */

.vote-btn{

grid-column:span 3;

background:#2a5bd7;

color:white;

font-size:22px;

}

.vote-btn:hover{
background:#1e46b8;
}

/* СЧЁТЧИК */

.counter{
font-size:14px;
margin-top:8px;
opacity:0.9;
}

/* FOOTER */

.footer{
text-align:center;
padding:25px;
color:#666;
font-size:14px;
}

/* ===== АДАПТИВНОСТЬ ===== */

@media (max-width:900px){

.menu{
grid-template-columns:repeat(2,1fr);
}

.vote-btn{
grid-column:span 2;
}

}

@media (max-width:600px){

.header h1{
font-size:28px;
}

.menu{
grid-template-columns:1fr;
}

.menu a{
font-size:20px;
padding:25px;
}

.vote-btn{
grid-column:span 1;
font-size:24px;
}

}

</style>

</head>

<body>

<div class="header">

<h1>Деревня Захожье</h1>

<p>Информационный портал инициативы жителей</p>

</div>

<div class="menu">

<a href="about.html">
<span>🏡</span>
О проекте
</a>

<a href="faq.html">
<span>❓</span>

<span>📜</span>

<a class="menu-btn" href="documents.html">

</a>

<a href="vote.html" class="vote-btn">

<span>🗳</span>
Пройти опрос

<div class="counter" id="counter">
Загрузка статистики...

</a>

<div class="footer">

© Инициативная группа жителей Захожья

</div>


<script>

/* ID таблицы Google Sheets */
const sheetID = "1lB6_E7lGqh-DiIx-x4Jy-B_z0pNWdkCvaJEftCKAjXg";

/* API Google */
const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

fetch(url)
.then(res => res.text())
.then(data => {

const json = JSON.parse(data.substring(47).slice(0,-2));
const rows = json.table.rows;

const total = rows.length;

document.getElementById("counter").innerText =
total + " жителей уже приняли участие";

})
.catch(() => {

document.getElementById("counter").innerText =
"Опрос жителей продолжается";

});

</script>

</body>
