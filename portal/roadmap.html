<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Дорожная карта проекта</title>

<link rel="stylesheet" href="/portal/mobile.css">

<style>

.roadmap {
    max-width: 900px;
    margin: 40px auto;
    font-family: Arial, sans-serif;
}

.roadmap h2 {
    margin-bottom: 10px;
}

.timeline {
    border-left: 3px solid #3a6ea5;
    padding-left: 25px;
}

.stage {
    margin-bottom: 35px;
    position: relative;
}

.stage::before {
    content: "";
    width: 14px;
    height: 14px;
    background: #3a6ea5;
    border-radius: 50%;
    position: absolute;
    left: -33px;
    top: 5px;
}

.stage h3 {
    margin: 0 0 8px 0;
}

.stage p {
    margin: 6px 0;
}

.stage ul {
    margin: 8px 0 0 18px;
}

</style>

</head>

<body>

<div class="roadmap">

<h2>Дорожная карта восстановления деревни Захожье</h2>
