<div class="roadmap">

<h2>Дорожная карта восстановления деревни Захожье</h2>

<p>
Проект восстановления исторической деревни Захожье реализуется
поэтапно. Ниже представлен общий план действий —
от опроса жителей до официального создания населённого пункта.
</p>

<div class="timeline">

<div class="stage">
<h3>Этап 0 — Опрос жителей</h3>

<p>
Сейчас проводится опрос жителей массива Захожье
о готовности поддержать инициативу восстановления деревни.
</p>

<p>Принять участие можно:</p>

<ul>
<li>через Telegram-бот проекта;</li>
<li>через форму на сайте;</li>
<li>на бумажной анкете в магазине «Захожье-2».</li>
</ul>

<p>
Результаты опроса помогут понять уровень поддержки
и собрать данные о населении.
</p>
</div>

<div class="stage">
<h3>Этап 1 — Формирование инициативной группы</h3>

<p>
После получения достаточного количества ответов
формируется инициативная группа жителей.
</p>

<p>
В неё входят активные жители,
готовые участвовать в подготовке документов
и взаимодействии с администрацией.
</p>
</div>

<div class="stage">
<h3>Этап 2 — Подготовка документов</h3>

<p>
Готовится пакет документов для обращения
в органы местного самоуправления.
</p>

<ul>
<li>концепция восстановления деревни;</li>
<li>обоснование проекта;</li>
<li>данные о населении и застройке;</li>
<li>карты и схемы территории;</li>
<li>результаты опроса жителей.</li>
</ul>
</div>

<div class="stage">
<h3>Этап 3 — Работа с администрацией</h3>

<p>
Материалы направляются в администрацию
Никольского городского поселения
и администрацию Тосненского района.
</p>

<p>
При поддержке муниципалитета инициатива
может быть направлена в Правительство
Ленинградской области.
</p>
</div>

<div class="stage">
<h3>Этап 4 — Рассмотрение на уровне области</h3>

<p>
Подготавливается законопроект
о восстановлении деревни Захожье
и внесении её в перечень населённых пунктов
Ленинградской области.
</p>

<p>
Закон рассматривается Законодательным
собранием Ленинградской области.
</p>
</div>

<div class="stage">
<h3>Этап 5 — Внесение в государственные реестры</h3>

<p>
После принятия закона населённый пункт
вносится в государственные реестры
(ФИАС, Росреестр и другие).
</p>

<p>
Муниципалитет утверждает адреса домов
и названия улиц.
</p>
</div>

<div class="stage">
<h3>Этап 6 — Развитие территории</h3>

<p>
После восстановления деревни появляется
возможность полноценного развития территории:
</p>

<ul>
<li>участие в программах благоустройства;</li>
<li>развитие дорог и освещения;</li>
<li>улучшение инфраструктуры;</li>
<li>устойчивое развитие территории.</li>
</ul>

</div>

</div>
