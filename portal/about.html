<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>О проекте</title>

<link rel="stylesheet" href="/portal/mobile.css">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
line-height:1.5;
}

/* верхняя навигация */

.top-nav{
position:sticky;
top:0;
background:white;
padding:10px;
border-bottom:1px solid #ddd;
z-index:1000;
}

.back-btn{
display:inline-block;
background:#2a5bd7;
color:white;
text-decoration:none;
padding:10px 14px;
border-radius:8px;
font-size:14px;
}

.back-btn:active{
background:#1f46aa;
}

</style>

</head>

<body>

<div class="top-nav">

<a href="/" class="back-btn">
← Главное меню
</a>

</div>

<h1 id="title"></h1>

<div id="content"></div>

<script>

async function load(){

const r = await fetch("/api/page/about")

const data = await r.json()

document.getElementById("title").innerText = data.title
document.getElementById("content").innerHTML = data.content

}

load()

</script>

</body>
</html>
