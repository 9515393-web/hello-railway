<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="utf-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>О проекте</title>

<link rel="stylesheet" href="/portal/mobile.css">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
line-height:1.5;
}

</style>

</head>

<body>

<h1 id="title"></h1>

<div id="content"></div>

<script>

async function load(){

const r = await fetch("/api/page/about")

const data = await r.json()

document.getElementById("title").innerText = data.title
document.getElementById("content").innerHTML = data.content

}

load()

</script>

</body>

</html>
