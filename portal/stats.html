<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/portal/mobile.css">

<title>Статистика опроса — Захожье</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial, sans-serif;
margin:0;
background:#f5f7fb;
}

.header{
text-align:center;
padding:40px;
background:#2a5bd7;
color:white;
}

.container{
max-width:1000px;
margin:auto;
padding:40px;
}

.stats-grid{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:40px;

}

.stat-card{

background:white;
padding:25px;
border-radius:12px;
text-align:center;
box-shadow:0 6px 16px rgba(0,0,0,0.08);

}

.stat-number{
font-size:34px;
font-weight:bold;
margin-top:10px;
}

.chart-container{
max-width:600px;
margin:auto;
}

@media(max-width:700px){

.stats-grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="header">

<h1>Статистика опроса жителей</h1>
<p>Проект восстановления деревни Захожье</p>

</div>

<div class="container">

<div class="stats-grid">

<div class="stat-card">
Всего ответов
<div class="stat-number" id="total">—</div>
</div>

<div class="stat-card">
Поддерживают
<div class="stat-number" id="support">—</div>
</div>

<div class="stat-card">
Другие варианты
<div class="stat-number" id="other">—</div>
</div>

</div>

<div class="chart-container">
<canvas id="chart"></canvas>
</div>

</div>

<script>

const sheetID = "1lB6_E7lGqh-DiIx-x4Jy-B_z0pNWdkCvaJEftCKAjXg";

const url =
`https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

fetch(url)

.then(res => res.text())

.then(data => {

const json = JSON.parse(data.substring(47).slice(0,-2));

const rows = json.table.rows;

let support = 0;
let other = 0;

rows.forEach(row => {

const answer = row.c[1]?.v || "";

if(answer.includes("Поддерживаю"))
support++;
else
other++;

});

const total = rows.length;

document.getElementById("total").innerText = total;
document.getElementById("support").innerText = support;
document.getElementById("other").innerText = other;

const ctx = document.getElementById("chart");

new Chart(ctx,{

type:"pie",

data:{
labels:[
"Поддерживают инициативу",
"Другие ответы"
],

datasets:[{

data:[support,other],

backgroundColor:[
"#2a5bd7",
"#cccccc"
]

}]

}

});

});

</script>

</body>
</html>
