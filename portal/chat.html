<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="utf-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Чат жителей</title>

<link rel="stylesheet" href="/portal/mobile.css">

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f6fb;
display:flex;
flex-direction:column;
height:100vh;
}

/* верхняя панель */

.header{
background:#2a5bd7;
color:white;
padding:14px;
font-size:18px;
text-align:center;
}

/* список сообщений */

.chat{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:10px;
}

/* сообщение */

.msg{
background:white;
padding:10px 12px;
border-radius:10px;
max-width:80%;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
font-size:16px;
}

/* имя */

.name{
font-weight:bold;
font-size:13px;
color:#555;
margin-bottom:3px;
}

/* поле ввода */

.input-area{
display:flex;
gap:8px;
padding:10px;
background:white;
border-top:1px solid #ddd;
}

.input-area input{
flex:1;
padding:10px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

.input-area button{
padding:10px 16px;
border:none;
background:#2a5bd7;
color:white;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">
💬 Чат жителей
</div>

<div id="chat" class="chat"></div>

<div class="input-area">

<input id="name" placeholder="Ваше имя">

<input id="text" placeholder="Сообщение">

<button onclick="send()">➤</button>

</div>

<script>

let lastId = 0

async function load(){

const r = await fetch("/api/chat?after="+lastId)

const data = await r.json()

data.forEach(m=>{

lastId = m.id

const div=document.createElement("div")
div.className="msg"

div.innerHTML=
"<div class='name'>"+m.username+"</div>"+m.message

document.getElementById("chat").appendChild(div)

})

document.getElementById("chat").scrollTop=
document.getElementById("chat").scrollHeight

}

async function send(){

const user=document.getElementById("name").value
const text=document.getElementById("text").value

if(!text)return

await fetch("/api/chat/send",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
user:user||"Житель",
text:text
})
})

document.getElementById("text").value=""

}

setInterval(load,1500)

</script>

</body>
</html>
