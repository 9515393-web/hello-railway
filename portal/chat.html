<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Чат жителей</title>

<link rel="stylesheet" href="/portal/mobile.css?v=1">

<style>

body{
margin:0;
font-family:Arial, sans-serif;

background-image:url("/portal/chat_bg.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;

display:flex;
flex-direction:column;
height:100vh;
}

/* затемнение фона */

body::before{
content:"";
position:fixed;
top:0;
left:0;
right:0;
bottom:0;

background:rgba(255,255,255,0.55);

pointer-events:none;
}

/* HEADER */

.header{
background:#2a5bd7;
color:white;
padding:14px;
font-size:18px;
}


.online{
font-size:13px;
opacity:0.9;
}

/* CHAT */

.chat{
flex:1;
overflow-y:auto;
padding:12px;
display:flex;
flex-direction:column;
gap:10px;
padding-bottom:80px;
}

/* MESSAGE */

.msg{
display:flex;
gap:8px;
align-items:flex-end;
}

/* AVATAR */

.avatar{
width:32px;
height:32px;
border-radius:50%;
background:#2a5bd7;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
}

/* BUBBLE */

.bubble{
background:rgba(255,255,255,0.92);
padding:10px 12px;
border-radius:14px;
max-width:70%;
box-shadow:0 1px 4px rgba(0,0,0,0.15);
}

.name{
font-size:12px;
color:#666;
margin-bottom:3px;
}

/* INPUT */

.input{
display:flex;
flex-direction:column;
gap:8px;
padding:10px;
background:white;
border-top:1px solid #ddd;
}

.input textarea{
width:100%;
padding:12px;
font-size:16px;
border-radius:10px;
border:1px solid #ccc;
resize:none;
}

.input button{
background:#2a5bd7;
color:white;
border:none;
border-radius:10px;
padding:12px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

<div>💬 Чат жителей</div>

<div class="online" id="online">
0 онлайн
</div>

</div>

<div id="chat" class="chat"></div>

<div class="input">

<textarea id="text" maxlength="500" placeholder="Напишите сообщение..."></textarea>

<button onclick="send()">Отправить</button>

</div>

<script>

try {

let username = localStorage.getItem("chat_name")

if(!username){
    username = prompt("Введите имя")
    localStorage.setItem("chat_name", username)
}

function avatar(name){
    return name ? name.charAt(0).toUpperCase() : "?"
}

function renderMessage(m){

    if(!m || !m.id) return

    if(document.getElementById("msg_"+m.id)) return

    const msg = document.createElement("div")
    msg.className="msg"
    msg.id="msg_"+m.id

    msg.innerHTML = `
    <div class="avatar">${avatar(m.username)}</div>

    <div class="bubble">
        <div class="name">
            ${m.username || "?"}
            ${m.username === username ? 
            `<span onclick="deleteMsg(${m.id})">✖</span>` : ""}
        </div>

        ${m.deleted ? "<i>сообщение удалено</i>" : (m.message || "")}
    </div>
    `

    const chat = document.getElementById("chat")
    if(chat){
        chat.appendChild(msg)
        chat.scrollTop = chat.scrollHeight
    }
}

/* ===== WebSocket ===== */

let ws = null

function connectWS(){

    const protocol = location.protocol === "https:" ? "wss://" : "ws://"
    const wsUrl = protocol + location.host + "/ws/chat"

    console.log("CONNECT TO:", wsUrl)

    ws = new WebSocket(wsUrl)

    ws.onopen = () => {
        console.log("WS CONNECTED")
        loadHistory()
    }

    ws.onclose = () => {
        console.log("WS CLOSED")
        setTimeout(connectWS, 3000)
    }

    ws.onerror = (e) => {
        console.log("WS ERROR", e)
    }

    ws.onmessage = (event) => {
        try {
            const m = JSON.parse(event.data)
            renderMessage(m)
        } catch(e){
            console.log("PARSE ERROR", e)
        }
    }
}

/* ===== отправка ===== */

function send(){

    const el = document.getElementById("text")
    if(!el) return

    const text = el.value.trim()
    if(!text) return

    if (!ws || ws.readyState !== WebSocket.OPEN) {
        alert("Нет соединения с сервером")
        return
    }

    ws.send(JSON.stringify({
        action: "send",
        user: username,
        text: text
    }))

    el.value=""
}

/* ===== удаление ===== */

function deleteMsg(id){

    if (!ws || ws.readyState !== WebSocket.OPEN) return

    ws.send(JSON.stringify({
        action: "delete",
        id: id,
        user: username
    }))
}

/* ===== история ===== */

async function loadHistory(){
    try {
        const r = await fetch("/api/chat/history")
        const data = await r.json()
        data.forEach(renderMessage)
    } catch(e){
        console.log("HISTORY ERROR", e)
    }
}

/* ===== старт ===== */

connectWS()

} catch(e) {
    console.log("GLOBAL ERROR", e)
}

</script>

<div class="bottom-home">
    <a href="/portal/index.html" class="home-btn">
        🏠 Вернуться в главное меню
    </a>
</div>

</body>
</html>
