<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Чат жителей</title>

<style>

body{
margin:0;
font-family:Arial;
background:#e9edf2;
}

.container{
max-width:700px;
margin:auto;
height:100vh;
display:flex;
flex-direction:column;
}

.header{
background:#2a5bd7;
color:white;
padding:15px;
font-size:20px;
}

#chat{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
max-width:70%;
padding:10px 14px;
border-radius:12px;
background:white;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.me{
align-self:flex-end;
background:#d2e3ff;
}

.user{
font-size:12px;
opacity:.7;
margin-bottom:3px;
}

.time{
font-size:10px;
opacity:.5;
margin-top:4px;
text-align:right;
}

.input{
display:flex;
gap:10px;
padding:10px;
background:white;
border-top:1px solid #ddd;
}

input{
padding:10px;
border:1px solid #ccc;
border-radius:6px;
}

#name{width:140px;}
#msg{flex:1;}

button{
background:#2a5bd7;
color:white;
border:0;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="header">💬 Чат жителей</div>

<div id="chat"></div>

<div class="input">

<input id="name" placeholder="Имя">
<input id="msg" placeholder="Сообщение">

<button onclick="send()">Отправить</button>

</div>

</div>

<script>

const chat = document.getElementById("chat")

let lastId = 0

// сохранить имя
const saved = localStorage.getItem("chat_name")
if(saved) document.getElementById("name").value = saved

document.getElementById("name").addEventListener("change",()=>{
localStorage.setItem("chat_name",document.getElementById("name").value)
})

// загрузка сообщений
async function load(){

const r = await fetch(`/api/chat?after=${lastId}`)
const data = await r.json()

if(!Array.isArray(data)) return

const name = document.getElementById("name").value

data.forEach(m=>{

lastId = m.id

const div = document.createElement("div")
div.className="msg"

if(m.username===name) div.classList.add("me")

const time = new Date(m.created_at).toLocaleTimeString()

div.innerHTML=`
<div class="user">${m.username}</div>
${m.message}
<div class="time">${time}</div>
`

chat.appendChild(div)

})

if(data.length>0){
chat.scrollTop = chat.scrollHeight
}

}

// отправка
async function send(){

const user = document.getElementById("name").value
const text = document.getElementById("msg").value

if(!user || !text) return

await fetch("/api/chat/send",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
user:user,
text:text
})
})

document.getElementById("msg").value=""

load()

}

// Enter отправка
document.getElementById("msg").addEventListener("keypress",e=>{
if(e.key==="Enter") send()
})

setInterval(load,2000)

load()

</script>

</body>
</html>
