<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Чат жителей</title>

<style>

body{
font-family:Arial;
background:#e6ecf0;
margin:0;
}

.container{
max-width:700px;
margin:auto;
display:flex;
flex-direction:column;
height:100vh;
}

.header{
background:#2a5bd7;
color:white;
padding:15px;
font-size:20px;
}

#chat{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
max-width:70%;
padding:10px 14px;
border-radius:12px;
background:white;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.me{
align-self:flex-end;
background:#d2e3ff;
}

.user{
font-size:12px;
opacity:0.7;
margin-bottom:4px;
}

.input{
display:flex;
gap:10px;
padding:10px;
background:white;
border-top:1px solid #ddd;
}

input{
padding:10px;
border:1px solid #ccc;
border-radius:6px;
}

#name{
width:150px;
}

#msg{
flex:1;
}

button{
background:#2a5bd7;
color:white;
border:0;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
💬 Чат жителей
</div>

<div id="chat"></div>

<div class="input">

<input id="name" placeholder="Имя">

<input id="msg" placeholder="Сообщение">

<button onclick="send()">Отправить</button>

</div>

</div>

<script>

const chat = document.getElementById("chat")

// сохранить имя

const savedName = localStorage.getItem("chat_name")

if(savedName){
document.getElementById("name").value = savedName
}

function saveName(){
const name = document.getElementById("name").value
localStorage.setItem("chat_name",name)
}

document.getElementById("name").addEventListener("change",saveName)

async function load(){

const r = await fetch("/api/chat")
const data = await r.json()

if(!Array.isArray(data)) return

const name = document.getElementById("name").value

chat.innerHTML = ""

data.reverse().forEach(m=>{

const div = document.createElement("div")

div.className = "msg"

if(m.username === name){
div.classList.add("me")
}

div.innerHTML = `
<div class="user">${m.username}</div>
${m.message}
`

chat.appendChild(div)

})

// автоскролл

chat.scrollTop = chat.scrollHeight

}

async function send(){

const user = document.getElementById("name").value
const text = document.getElementById("msg").value

if(!user || !text) return

await fetch("/api/chat/send",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
user:user,
text:text
})
})

document.getElementById("msg").value=""

load()

}

// Enter отправляет сообщение

document.getElementById("msg").addEventListener("keypress",function(e){

if(e.key==="Enter"){
send()
}

})

setInterval(load,2000)

load()

</script>

</body>
</html>
