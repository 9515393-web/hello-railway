<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<title>Документы проекта</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
}

.header{
background:#2a5bd7;
color:white;
padding:30px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:40px;
}

.section{
background:white;
padding:30px;
border-radius:10px;
margin-bottom:30px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.section h2{
margin-top:0;
}

.doc{
display:block;
padding:12px;
margin-top:10px;
background:#f0f4ff;
border-radius:6px;
text-decoration:none;
color:#2a5bd7;
}

.doc:hover{
background:#e2e9ff;
}

.back{
display:inline-block;
margin-top:30px;
padding:12px 20px;
background:#2a5bd7;
color:white;
text-decoration:none;
border-radius:8px;
}

</style>

</head>

<body>

<div class="header">
<h1>Документы проекта</h1>
</div>

<div class="container">

<div class="section">
<h2>📜 Нормативные документы</h2>
<div id="normative"></div>
</div>

<div class="section">
<h2>📄 Подготовленные документы</h2>
<div id="prepared"></div>
</div>

<div class="section">
<h2>📥 Входящие документы</h2>
<div id="incoming"></div>
</div>

<div class="section">
<h2>📤 Исходящие документы</h2>
<div id="outgoing"></div>
</div>

<div class="section">
<h2>🤝 Документы инициативной группы</h2>
<div id="initiative"></div>
</div>

<a class="back" href="index.html">
← Вернуться на главную
</a>

</div>

<script>

async function loadDocuments(){

const res = await fetch("/api/documents");
const data = await res.json();

const categories = ["normative","prepared","incoming","outgoing","initiative"];

categories.forEach(cat => {

const container = document.getElementById(cat);
container.innerHTML = "";

data[cat].forEach(doc => {

const link = document.createElement("a");
link.href = doc.url;
link.textContent = doc.name;
link.target = "_blank";
link.className = "doc";

container.appendChild(link);

});

});

}

loadDocuments();

</script>

</div>

<div class="bottom-home">

<a href="/" class="home-btn">
🏠 Вернуться в главное меню
</a>

</div>

</div>

</body>
</html>
