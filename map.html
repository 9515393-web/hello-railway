<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Админ-карта Захожье</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    html, body, #map { height: 100%; margin: 0; }

    .leaflet-popup-content{
      width: 420px !important;
      max-width: 420px !important;
      max-height: 60vh;
      overflow-y: auto;
      font-size: 15px;
    }

    .popup-raw { margin-bottom: 12px; }

    .edit-box{
      border-top: 1px solid #ddd;
      padding-top: 10px;
      margin-top: 10px;
    }

    .edit-row{ margin: 8px 0; }

    .edit-row label{
      display:block;
      font-size: 13px;
      opacity: .8;
      margin-bottom: 4px;
    }

    .edit-row input, .edit-row textarea{
      width: 100%;
      box-sizing: border-box;
      font-size: 14px;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .edit-actions{
      display:flex;
      gap:10px;
      margin-top: 10px;
    }

    .btn{
      flex:1;
      padding:10px;
      border-radius:10px;
      border:0;
      cursor:pointer;
      font-size:14px;
    }

    .btn-save{ background:#1f7ae0; color:#fff; }
    .btn-reload{ background:#eee; }

    .status-line{
      margin-top:8px;
      font-size:12px;
      opacity:.7;
    }

    .parcel-label{
      background:transparent !important;
      border:none !important;
      box-shadow:none !important;
      font-weight:700;
      font-size:12px;
      text-shadow:0 0 2px #fff;
    }
  </style>
</head>
<body>
<div id="map"></div>

<script>
(function () {

  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");
  if (!token) { alert("Нет токена доступа"); throw new Error("No token"); }

  const map = L.map("map");
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

  function escapeHtml(s) {
    return String(s ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function cardFinalToHtml(rawCard) {
    return escapeHtml(rawCard).replace(/\n/g, "<br>");
  }

  function isLandParcel(feature) {
    const raw = String(feature?.properties?.card_final || "");
    const m = raw.match(/Площадь\s+земельного\s+участка\s+(\d+)/i);
    if (!m) return false;
    return Number(m[1]) >= 400;
  }

  function getPlotKey(feature) {
  const uch = String(feature?.properties?.uch_num || "").trim();
  const card = String(feature?.properties?.card_final || "");
  const m = card.match(/Захожье\s*[-–—]?\s*(2|3|4|5|6)\b/i);
  const snt = m ? m[1] : "0";

  return `${snt}-${uch}`;   // ← ВАЖНО: дефис
}

  async function apiGetPlot(plotKey) {
    const r = await fetch(`/api/plot/${encodeURIComponent(plotKey)}?token=${encodeURIComponent(token)}`);
    if (!r.ok) throw new Error("GET failed");
    return await r.json();
  }

  async function apiSavePlot(plotKey, payload) {
    const r = await fetch(`/api/plot/${encodeURIComponent(plotKey)}?token=${encodeURIComponent(token)}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    if (!r.ok) throw new Error("POST failed");
    return await r.json();
  }

  function renderPopupHtml(rawCard, plotKey) {
    return `
      <div>
        <div class="popup-raw">${cardFinalToHtml(rawCard)}</div>

        <div class="edit-box">
          <div style="font-weight:700;margin-bottom:6px;">✍️ Данные участника</div>

          <div class="edit-row">
            <label>Ф.И.О.</label>
            <input id="fio-${plotKey}" type="text">
          </div>

          <div class="edit-row">
            <label>Телефон</label>
            <input id="phone-${plotKey}" type="text">
          </div>

          <div class="edit-row">
            <label>Примечание</label>
            <textarea id="note-${plotKey}" rows="3"></textarea>
          </div>

          <div class="edit-actions">
            <button class="btn btn-reload" id="reload-${plotKey}">♻️ Обновить</button>
            <button class="btn btn-save" id="save-${plotKey}">💾 Сохранить</button>
          </div>

          <div class="status-line" id="status-${plotKey}">plot_key: ${escapeHtml(plotKey)}</div>
        </div>
      </div>
    `;
  }

  function getPlotStyle(fio, phone) {

  const hasFio = !!fio?.trim();
  const hasPhone = !!phone?.trim();

  if (hasFio && hasPhone) {
    return {
      color: "#008000",
      fillColor: "#00cc00",
      fillOpacity: 0.5,
      weight: 2
    };
  }

  if (hasFio || hasPhone) {
    return {
      color: "#cc7a00",
      fillColor: "#ff9900",
      fillOpacity: 0.5,
      weight: 2
    };
  }

  return {
    color: "#cc0000",
    fillColor: "#ff0000",
    fillOpacity: 0.3,
    weight: 2
  };
}
  
  function bindPopupLogic(layer, feature) {
  const rawCard = String(feature?.properties?.card_final || "").trim();
  const plotKey = getPlotKey(feature);

  layer.bindPopup(renderPopupHtml(rawCard, plotKey), { maxWidth: 9999 });

  layer.on("popupopen", async (e) => {

    console.log("PLOT KEY:", plotKey);

    map.dragging.disable();
    map.scrollWheelZoom.disable();
    map.doubleClickZoom.disable();

    const container = e.popup.getElement();
    if (!container) return;

    L.DomEvent.disableClickPropagation(container);
    L.DomEvent.disableScrollPropagation(container);

    const fioEl = container.querySelector(`#fio-${plotKey}`);
    const phoneEl = container.querySelector(`#phone-${plotKey}`);
    const noteEl = container.querySelector(`#note-${plotKey}`);
    const statusEl = container.querySelector(`#status-${plotKey}`);
    const saveBtn = container.querySelector(`#save-${plotKey}`);
    const reloadBtn = container.querySelector(`#reload-${plotKey}`);

    const setStatus = (t) => { if (statusEl) statusEl.textContent = t; };

    async function load() {
      try {
        setStatus("⏳ Загружаю...");
        const data = await apiGetPlot(plotKey);
        if (fioEl) fioEl.value = data?.fio ?? "";
        if (phoneEl) phoneEl.value = data?.phone ?? "";
        if (noteEl) noteEl.value = data?.note ?? "";
        // 🎨 применяем цвет
        const style = getPlotStyle(data?.fio, data?.phone);
        layer.setStyle(style);
        setStatus("✅ Загружено");
      } catch (err) {
        console.error(err);
        setStatus("❌ Ошибка загрузки");
      }
    }

    if (reloadBtn) {
      reloadBtn.onclick = (ev) => {
        ev.preventDefault();
        ev.stopPropagation();
        load();
      };
    }

    if (saveBtn) {
      saveBtn.onclick = async (ev) => {
        ev.preventDefault();
        ev.stopPropagation();

        console.log("SAVE CLICKED", plotKey);

        try {
          setStatus("💾 Сохраняю...");
          await apiSavePlot(plotKey, {
            fio: fioEl?.value?.trim() || null,
            phone: phoneEl?.value?.trim() || null,
            note: noteEl?.value?.trim() || null,
          });
          setStatus("✅ Сохранено");
          // 🎨 обновляем цвет после сохранения
          const style = getPlotStyle(
            fioEl?.value,
            phoneEl?.value
          );
          layer.setStyle(style);
        } catch (err) {
          console.error(err);
          setStatus("❌ Ошибка сохранения");
        }
      };
    }

    await load();
  });

  layer.on("popupclose", () => {
    map.dragging.enable();
    map.scrollWheelZoom.enable();
    map.doubleClickZoom.enable();
  });
}


fetch(`Zahozhe_final_2026.geojson?token=${encodeURIComponent(token)}`)
  .then(r => r.json())
  .then(data => {

    const parcelsLayer = L.geoJSON(data, {
      filter: isLandParcel,
      style: {
        color: "#cc0000",
        fillColor: "#ff0000",
        fillOpacity: 0.3,
        weight: 2
      },
      onEachFeature: (feature, layer) => {

        bindPopupLogic(layer, feature);

        const uch = feature?.properties?.uch_num;

        if (
          uch &&
          layer instanceof L.Polygon &&
          layer.getLatLngs &&
          layer.getLatLngs().length > 0
        ) {
          try {
            layer.bindTooltip(String(uch), {
              permanent: true,
              direction: "center",
              className: "parcel-label"
            });
          } catch (e) {
            console.warn("Tooltip skipped:", uch);
          }
        }
      }
        }).addTo(map);

    parcelsLayer.eachLayer(async (layer) => {
      const feature = layer.feature;
      if (!feature) return;

      const plotKey = getPlotKey(feature);

      try {
        const data = await apiGetPlot(plotKey);
        const style = getPlotStyle(data?.fio, data?.phone);
        layer.setStyle(style);
      } catch (e) {
        console.warn("Color load failed:", plotKey);
      }
    });

    map.fitBounds(parcelsLayer.getBounds(), { padding: [20,20], maxZoom: 18 });

  });

})();
</script>
</body>
</html>
