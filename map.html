<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Админ-карта Захожье</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    html, body, #map { height: 100%; margin: 0; }

    .leaflet-popup-content{
      width: 420px !important;
      max-width: 420px !important;
      max-height: 60vh;
      overflow-y: auto;
      font-size: 15px;
    }

    .popup-raw { margin-bottom: 12px; }

    .edit-box{
      border-top: 1px solid #ddd;
      padding-top: 10px;
      margin-top: 10px;
    }

    .edit-row{ margin: 8px 0; }

    .edit-row label{
      display:block;
      font-size: 13px;
      opacity: .8;
      margin-bottom: 4px;
    }

    .edit-row input, .edit-row textarea{
      width: 100%;
      box-sizing: border-box;
      font-size: 14px;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .edit-actions{
      display:flex;
      gap:10px;
      margin-top: 10px;
    }

    .btn{
      flex:1;
      padding:10px;
      border-radius:10px;
      border:0;
      cursor:pointer;
      font-size:14px;
    }

    .btn-save{ background:#1f7ae0; color:#fff; }
    .btn-reload{ background:#eee; }

    .status-line{
      margin-top:8px;
      font-size:12px;
      opacity:.7;
    }

    .parcel-label{
      background:transparent !important;
      border:none !important;
      box-shadow:none !important;
      font-weight:700;
      font-size:12px;
      text-shadow:0 0 2px #fff;
    }
  </style>
</head>
<body>
<div id="map"></div>

<script>
(function () {

  // ===============================
  // SAFE ID (фикс для :)
  // ===============================
  function safeId(key) {
    return String(key).replace(/[^a-zA-Z0-9_-]/g, "_");
  }

  // ===============================
  // ПРОВЕРКИ GEO
  // ===============================
  function hasGeometry(feature) {
    const g = feature?.geometry;
    if (!g) return false;

    const coords = g.coordinates;
    if (!coords) return false;

    if (!Array.isArray(coords)) return false;
    if (coords.length === 0) return false;

    return true;
  }

  function isLandParcel(feature) {
    if (!hasGeometry(feature)) return false;

    const raw = String(feature?.properties?.card_final || "");
    const m = raw.match(/Площадь\s+земельного\s+участка\s+(\d+)/i);

    if (!m) return false;
    return Number(m[1]) >= 400;
  }

  function layerHasLatLngs(layer) {
    if (!layer || !layer.getLatLngs) return false;

    let ll;
    try { ll = layer.getLatLngs(); } catch (e) { return false; }

    if (!Array.isArray(ll) || ll.length === 0) return false;

    const a0 = ll[0];
    if (!Array.isArray(a0) || a0.length === 0) return false;

    if (Array.isArray(a0[0])) {
      return Array.isArray(a0[0]) && a0[0].length > 0;
    }

    return true;
  }

  // ===============================
  // КЛЮЧ = КАДАСТР
  // ===============================
  function getPlotKey(feature) {
    const text = feature?.properties?.card_final || "";

    const match = text.match(/\d{2}:\d{2}:\d+:\d+/);

    if (match) return match[0];

    return null;
  }

  // ===============================
  // API
  // ===============================
  async function apiGetPlot(plotKey) {
    const r = await fetch(`/api/plot/${encodeURIComponent(plotKey)}`);
    if (!r.ok) throw new Error("GET failed");
    return await r.json();
  }

  async function apiSavePlot(plotKey, payload) {
    const r = await fetch(`/api/plot/${encodeURIComponent(plotKey)}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    if (!r.ok) throw new Error("POST failed");
    return await r.json();
  }

  // ===============================
  // PARSE карточки
  // ===============================
  function parseCard(text) {
    return {
      address: (text.match(/Адрес:\s*([^;]+)/i) || [])[1] || "",
      cad: (text.match(/\d{2}:\d{2}:\d+:\d+/) || [])[0] || "",
      area: (text.match(/Площадь[^0-9]*(\d+)/i) || [])[1] || "",
      raw: text
    };
  }

  // ===============================
  // POPUP HTML
  // ===============================
  function renderPopupHtml(rawCard, plotKey) {
    const data = parseCard(rawCard);
    const sid = safeId(plotKey);

    return `
      <div>
        <div style="margin-bottom:10px;">
          <b>📍 Адрес:</b><br>${data.address}<br><br>
          <b>🏠 Кадастровый номер:</b><br>
          <b style="color:#2a5bd7;">${data.cad}</b><br><br>
          <b>📐 Площадь:</b> ${data.area} м²
        </div>

        <div class="edit-row">
          <label>Ф.И.О.</label>
          <input id="fio-${sid}" type="text">
        </div>

        <div class="edit-row">
          <label>Телефон</label>
          <input id="phone-${sid}" type="text">
        </div>

        <div class="edit-row">
          <label>Email</label>
          <input id="email-${sid}" type="text">
        </div>

        <div class="edit-row">
          <label>Примечание</label>
          <textarea id="note-${sid}" rows="3"></textarea>
        </div>

        <div class="edit-row">
          <label>
            <input type="checkbox" id="voted-${sid}">
            Проголосовал
          </label>
        </div>

        <div class="edit-actions">
          <button id="save-${sid}" class="btn btn-save">💾 Сохранить</button>
        </div>

        <div id="status-${sid}" class="status-line">${plotKey}</div>
      </div>
    `;
  }

  // ===============================
  // СТИЛИ
  // ===============================
  function getPlotStyle(fio, phone, voted) {

    if (voted) {
      return { color:"#006400", fillColor:"#00cc00", fillOpacity:0.6, weight:2 };
    }

    if (fio && phone) {
      return { color:"#008000", fillColor:"#00cc00", fillOpacity:0.4, weight:2 };
    }

    if (fio || phone) {
      return { color:"#cc7a00", fillColor:"#ff9900", fillOpacity:0.5, weight:2 };
    }

    return { color:"#cc0000", fillColor:"#ff0000", fillOpacity:0.3, weight:2 };
  }

  // ===============================
  // POPUP ЛОГИКА
  // ===============================
  function bindPopupLogic(feature, layer) {

    const rawCard = String(feature?.properties?.card_final || "").trim();
    const plotKey = getPlotKey(feature);

    if (!plotKey) return;

    const sid = safeId(plotKey);

    layer.bindPopup(renderPopupHtml(rawCard, plotKey));

    layer.on("popupopen", async (e) => {

      const el = e.popup.getElement();

      const fio = el.querySelector(`#fio-${sid}`);
      const phone = el.querySelector(`#phone-${sid}`);
      const email = el.querySelector(`#email-${sid}`);
      const note = el.querySelector(`#note-${sid}`);
      const voted = el.querySelector(`#voted-${sid}`);
      const save = el.querySelector(`#save-${sid}`);
      const status = el.querySelector(`#status-${sid}`);

      const setStatus = (t) => status.textContent = t;

      // LOAD
      try {
        setStatus("⏳ загрузка...");
        const data = await apiGetPlot(plotKey);

        fio.value = data?.fio || "";
        phone.value = data?.phone || "";
        email.value = data?.email || "";
        note.value = data?.note || "";
        voted.checked = data?.voted || false;

        layer.setStyle(getPlotStyle(data?.fio, data?.phone, data?.voted));

        setStatus("✅ загружено");
      } catch (e) {
        console.error(e);
        setStatus("❌ ошибка загрузки");
      }

      // SAVE
      save.onclick = async () => {
        try {
          setStatus("💾 сохранение...");

          await apiSavePlot(plotKey, {
            fio: fio.value || null,
            phone: phone.value || null,
            email: email.value || null,
            note: note.value || null,
            voted: voted.checked
          });

          layer.setStyle(getPlotStyle(fio.value, phone.value, voted.checked));

          setStatus("✅ сохранено");
        } catch (e) {
          console.error(e);
          setStatus("❌ ошибка сохранения");
        }
      };
    });
  }

  // ===============================
  // MAP INIT
  // ===============================
  const map = L.map("map");
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

  // ===============================
  // LOAD DATA
  // ===============================
  Promise.all([
    fetch("Zahozhe_final_2026.geojson").then(r => r.json()),
    fetch(`/api/plot/all`).then(r => r.json())
  ])
  .then(([geojson, all]) => {

    const layer = L.geoJSON(geojson, {
      filter: isLandParcel,
      style: f => {
        const key = getPlotKey(f);
        const d = all?.[key];
        return getPlotStyle(d?.fio, d?.phone, d?.voted);
      },
      onEachFeature: (feature, layer) => {

        bindPopupLogic(feature, layer);

        const uch = (feature?.properties?.uch_num ?? "").toString().trim();

        if (uch && layerHasLatLngs(layer)) {
          try {
            layer.bindTooltip(String(uch), {
              permanent: true,
              direction: "center",
              className: "parcel-label"
            });
          } catch (e) {
            console.warn("Tooltip error:", e);
          }
        }
      }
    }).addTo(map);

    map.fitBounds(layer.getBounds());

  })
  .catch(err => console.error("LOAD ERROR:", err));

})();
</script>
</body>
</html>
