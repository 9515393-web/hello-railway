<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Админ-карта Захожье</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    html, body, #map { height: 100%; margin: 0; }

    .leaflet-popup-content{
      width: 420px !important;
      max-width: 420px !important;
      max-height: 60vh;
      overflow-y: auto;
      font-size: 15px;
    }

    .popup-raw { margin-bottom: 12px; }

    .edit-box{
      border-top: 1px solid #ddd;
      padding-top: 10px;
      margin-top: 10px;
    }

    .edit-row{ margin: 8px 0; }

    .edit-row label{
      display:block;
      font-size: 13px;
      opacity: .8;
      margin-bottom: 4px;
    }

    .edit-row input, .edit-row textarea{
      width: 100%;
      box-sizing: border-box;
      font-size: 14px;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .edit-actions{
      display:flex;
      gap:10px;
      margin-top: 10px;
    }

    .btn{
      flex:1;
      padding:10px;
      border-radius:10px;
      border:0;
      cursor:pointer;
      font-size:14px;
    }

    .btn-save{ background:#1f7ae0; color:#fff; }
    .btn-reload{ background:#eee; }

    .status-line{
      margin-top:8px;
      font-size:12px;
      opacity:.7;
    }

    .parcel-label{
      background:transparent !important;
      border:none !important;
      box-shadow:none !important;
      font-weight:700;
      font-size:12px;
      text-shadow:0 0 2px #fff;
    }
  </style>
</head>
<body>
<div id="map"></div>

<script>
(function () {

  const map = L.map("map");
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

  function escapeHtml(s) {
    return String(s ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function cardFinalToHtml(rawCard) {
    return escapeHtml(rawCard).replace(/\n/g, "<br>");
  }

  function hasGeometry(feature) {
  const g = feature?.geometry;
  if (!g) return false;

  const coords = g.coordinates;
  if (!coords) return false;

  // просто проверка что есть хоть что-то
  if (!Array.isArray(coords)) return false;
  if (coords.length === 0) return false;

  return true;
}

function isLandParcel(feature) {
  if (!hasGeometry(feature)) return false;

  const raw = String(feature?.properties?.card_final || "");
  const m = raw.match(/Площадь\s+земельного\s+участка\s+(\d+)/i);
  if (!m) return false;
  return Number(m[1]) >= 400;
}

function layerHasLatLngs(layer) {
  if (!layer || !layer.getLatLngs) return false;

  let ll;
  try { ll = layer.getLatLngs(); } catch (e) { return false; }

  if (!Array.isArray(ll) || ll.length === 0) return false;

  // polygon: [[LatLng...]]
  // multipolygon: [[[LatLng...]]]
  const a0 = ll[0];
  if (!Array.isArray(a0) || a0.length === 0) return false;

  // если это multipolygon, a0[0] тоже массив
  if (Array.isArray(a0[0])) {
    return Array.isArray(a0[0]) && a0[0].length > 0;
  }

  return true;
}

  function getPlotKey(feature) {

  console.log("PROPS:", feature.properties); // 👈 ВОТ ЭТА СТРОКА

  const uch = String(feature?.properties?.uch_num || "").trim();

  // ❗ если нет номера — НЕ создаём ключ
  if (!uch) {
    console.warn("NO uch_num:", feature.properties);
    return null;
  }

  const card = String(feature?.properties?.card_final || "");
  const m = card.match(/Захожье\s*[-–—]?\s*(2|3|4|5|6)\b/i);
  const snt = m ? m[1] : "0";

  return `${snt}-${uch}`;
}

  async function apiGetPlot(plotKey) {
  const r = await fetch(`/api/plot/${encodeURIComponent(plotKey)}`);
  if (!r.ok) throw new Error("GET failed");
  return await r.json();
}

  async function apiSavePlot(plotKey, payload) {
  const r = await fetch(`/api/plot/${encodeURIComponent(plotKey)}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });
  if (!r.ok) throw new Error("POST failed");
  return await r.json();
}

  function renderPopupHtml(rawCard, plotKey) {
    return `
      <div>
        <div class="popup-raw">${cardFinalToHtml(rawCard)}</div>

        <div class="edit-box">
          <div style="font-weight:700;margin-bottom:6px;">✍️ Данные участника</div>

          <div class="edit-row">
            <label>Ф.И.О.</label>
            <input id="fio-${plotKey}" type="text">
          </div>

          <div class="edit-row">
            <label>Телефон</label>
            <input id="phone-${plotKey}" type="text">
          </div>

          <div class="edit-row">
            <label>Примечание</label>
            <textarea id="note-${plotKey}" rows="3"></textarea>
          </div>

          <div class="edit-row">
            <label>
              <input type="checkbox" id="voted-${plotKey}">
              Проголосовал
            </label>
          </div>

          <div class="edit-actions">
            <button class="btn btn-reload" id="reload-${plotKey}">♻️ Обновить</button>
            <button class="btn btn-save" id="save-${plotKey}">💾 Сохранить</button>
          </div>

          <div class="status-line" id="status-${plotKey}">plot_key: ${escapeHtml(plotKey)}</div>
        </div>
      </div>
    `;
  }

  function getPlotStyle(fio, phone, voted) {

  // 🟢 главный приоритет
  if (voted) {
    return {
      color: "#006400",
      fillColor: "#00cc00",
      fillOpacity: 0.6,
      weight: 2
    };
  }

  const hasFio = !!fio?.trim();
  const hasPhone = !!phone?.trim();

  if (hasFio && hasPhone) {
    return {
      color: "#008000",
      fillColor: "#00cc00",
      fillOpacity: 0.4,
      weight: 2
    };
  }

  if (hasFio || hasPhone) {
    return {
      color: "#cc7a00",
      fillColor: "#ff9900",
      fillOpacity: 0.5,
      weight: 2
    };
  }

  return {
    color: "#cc0000",
    fillColor: "#ff0000",
    fillOpacity: 0.3,
    weight: 2
  };
}
  
  function bindPopupLogic(layer, feature) {
  const rawCard = String(feature?.properties?.card_final || "").trim();
  const plotKey = getPlotKey(feature);

  layer.bindPopup(renderPopupHtml(rawCard, plotKey), { maxWidth: 9999 });

  layer.on("popupopen", async (e) => {

    console.log("PLOT KEY:", plotKey);

    map.dragging.disable();
    map.scrollWheelZoom.disable();
    map.doubleClickZoom.disable();

    const container = e.popup.getElement();
    if (!container) return;

    L.DomEvent.disableClickPropagation(container);
    L.DomEvent.disableScrollPropagation(container);

    const fioEl = container.querySelector(`#fio-${plotKey}`);
    const phoneEl = container.querySelector(`#phone-${plotKey}`);
    const noteEl = container.querySelector(`#note-${plotKey}`);
    const votedEl = container.querySelector(`#voted-${plotKey}`);
    const statusEl = container.querySelector(`#status-${plotKey}`);
    const saveBtn = container.querySelector(`#save-${plotKey}`);
    const reloadBtn = container.querySelector(`#reload-${plotKey}`);

    const setStatus = (t) => { if (statusEl) statusEl.textContent = t; };

    async function load() {
      try {
        setStatus("⏳ Загружаю...");
        const data = await apiGetPlot(plotKey);
        if (fioEl) fioEl.value = data?.fio ?? "";
        if (phoneEl) phoneEl.value = data?.phone ?? "";
        if (noteEl) noteEl.value = data?.note ?? "";
        if (votedEl) votedEl.checked = data?.voted ?? false;
        // 🎨 применяем цвет
        const style = getPlotStyle(data?.fio, data?.phone, data?.voted);
        layer.setStyle(style);
        setStatus("✅ Загружено");
      } catch (err) {
        console.error(err);
        setStatus("❌ Ошибка загрузки");
      }
    }

    if (reloadBtn) {
      reloadBtn.onclick = (ev) => {
        ev.preventDefault();
        ev.stopPropagation();
        load();
      };
    }

    if (!plotKey || plotKey.endsWith("-")) {
      alert("❌ Некорректный участок (нет номера)");
      return;
    }
    
    if (saveBtn) {
      saveBtn.onclick = async (ev) => {
        ev.preventDefault();
        ev.stopPropagation();

        console.log("SAVE CLICKED", plotKey);

        try {
          setStatus("💾 Сохраняю...");
          await apiSavePlot(plotKey, {
              fio: fioEl?.value?.trim() || null,
              phone: phoneEl?.value?.trim() || null,
              note: noteEl?.value?.trim() || null,
              voted: votedEl?.checked || false
          });
          setStatus("✅ Сохранено");
          // 🎨 обновляем цвет после сохранения
          const style = getPlotStyle(
            fioEl?.value,
            phoneEl?.value,
            votedEl?.checked
          );
          layer.setStyle(style);
        } catch (err) {
          console.error(err);
          setStatus("❌ Ошибка сохранения");
        }
      };
    }

    await load();
  });

  layer.on("popupclose", () => {
    map.dragging.enable();
    map.scrollWheelZoom.enable();
    map.doubleClickZoom.enable();
  });
}

function getUchNumber(feature) {
  return (feature?.properties?.uch_num ?? "").toString().trim();
}

function addParcelLabel(layer, feature) {
  const uch = getUchNumber(feature);
  if (!uch) return;
  if (!layer.getBounds) return;

  try {
    const center = layer.getBounds().getCenter();

    L.marker(center, {
      interactive: false,
      icon: L.divIcon({
        className: "parcel-label",
        html: String(uch)
      })
    }).addTo(map);

  } catch (e) {
    console.warn("Label skipped:", uch);
  }
}

const geojsonUrl = `Zahozhe_final_2026.geojson`;
const allUrl = `/api/plot/all`;

Promise.all([
  fetch(geojsonUrl).then(async r => {
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  }),
  fetch(allUrl).then(async r => {
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  })
])
.then(([geojson, allPlots]) => {

  const parcelsLayer = L.geoJSON(geojson, {
    filter: isLandParcel,
    style: (feature) => {
      const plotKey = getPlotKey(feature);
      const data = allPlots?.[plotKey];
      return getPlotStyle(data?.fio, data?.phone, data?.voted);
    },
    onEachFeature: (feature, layer) => {
      bindPopupLogic(layer, feature);

      const uch = (feature?.properties?.uch_num ?? "").toString().trim();
      if (uch && layerHasLatLngs(layer)) {
        try {
          layer.bindTooltip(String(uch), {
            permanent: true,
            direction: "center",
            className: "parcel-label"
          });
        } catch (e) {
          console.warn("Tooltip skipped:", uch, e);
        }
      }
    }
  }).addTo(map);

  try {
    const b = parcelsLayer.getBounds();
    if (b && b.isValid && b.isValid()) {
      map.fitBounds(b, { padding: [20, 20], maxZoom: 18 });
    }
  } catch (e) {
    console.warn("fitBounds skipped:", e);
  }

})
.catch(err => console.error("LOAD ERROR:", err));

})();
</script>
</body>
</html>
