<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Админ панель Захожье</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f0f0f0;
}

.header{
background:#222;
color:white;
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

button{
width:100%;
padding:12px;
border:none;
background:#1f7ae0;
color:white;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">
<h1>Админ панель проекта Захожье</h1>
</div>

<div class="container">

<div class="grid">

<div class="card">
<h2>🗺 Карта участков</h2>
<button onclick="openMap()">Открыть</button>
</div>

<div class="card">
<h2>📊 Аналитика</h2>
<button onclick="openStats()">Открыть</button>
</div>

<div class="card">
<h2>📁 Документы</h2>
<button onclick="openDocs()">Открыть</button>
</div>

<div class="card">
<h2>📣 Рассылки</h2>
<button onclick="openBroadcast()">Открыть</button>
</div>

<div class="card">
<h2>👥 База жителей</h2>
<button onclick="openResidents()">Открыть</button>
</div>

</div>

</div>

<script>

function openMap(){
window.location="/?token="+localStorage.token
}

function openStats(){
alert("аналитика скоро")
}

function openDocs(){
alert("документы скоро")
}

function openBroadcast(){
alert("рассылки скоро")
}

function openResidents(){
alert("база скоро")
}

</script>

</body>
</html>
