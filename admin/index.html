<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="utf-8">
<title>Админ панель</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0e1621;
color:white;
display:flex;
height:100vh;
}

.sidebar{
width:320px;
background:#17212b;
border-right:1px solid #0a1016;
overflow:auto;
}

.title{
padding:20px;
font-size:18px;
font-weight:bold;
border-bottom:1px solid #0a1016;
}

.item{
padding:16px 20px;
cursor:pointer;
border-bottom:1px solid #0a1016;
}

.item:hover{
background:#1f2c38;
}

.content{
flex:1;
background:#0e1621;
padding:40px;
}

button{
padding:12px 20px;
border:none;
border-radius:6px;
background:#2ea6ff;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="title">
Админ панель
</div>

<div class="item" onclick="openStats()">
Админ: статистика
</div>

<div class="item" onclick="openMap()">
Открыть админ-карту
</div>

<div class="item" onclick="openBroadcast()">
Админ: рассылка
</div>

<div class="item" onclick="openBroadcastHistory()">
История рассылок
</div>

<div class="item" onclick="openDocs()">
Документы инициативной группы
</div>

<div class="item" onclick="openChat()">
Чат инициативной группы
</div>

<div class="item" onclick="openMenu()">
Главное меню
</div>

</div>


<div class="content" id="content">

<h1>Админ панель проекта Захожье</h1>

</div>


<script>

function getToken(){

const params = new URLSearchParams(window.location.search)
return params.get("token")

}

function openMap(){

window.location="/?token="+getToken()

}

function openStats(){

document.getElementById("content").innerHTML=
"<h2>Админ: статистика</h2>"

}

function openBroadcast(){

document.getElementById("content").innerHTML=
"<h2>Админ: рассылка</h2>"

}

function openBroadcastHistory(){

document.getElementById("content").innerHTML=
"<h2>История рассылок</h2>"

}

function openDocs(){

document.getElementById("content").innerHTML=
"<h2>Документы инициативной группы</h2>"

}

function openChat(){

window.open("https://t.me/ВАШ_ЧАТ","_blank")

}

function openMenu(){

window.location="/site"

}

</script>

</body>
</html>
