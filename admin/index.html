<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="utf-8">
<title>Админ панель Захожье</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f1720;
color:white;
display:flex;
height:100vh;
}

.sidebar{

width:260px;
background:#111b26;
padding:20px;
box-sizing:border-box;
border-right:1px solid #243447;

}

.logo{
font-size:20px;
margin-bottom:30px;
font-weight:bold;
}

.menu-item{

padding:12px;
border-radius:8px;
cursor:pointer;
margin-bottom:6px;
}

.menu-item:hover{
background:#1e2c3a;
}

.content{

flex:1;
background:#17212b;
padding:30px;
box-sizing:border-box;
}

.card{

background:#111b26;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

button{

padding:10px 15px;
border:none;
border-radius:6px;
background:#2ea6ff;
color:white;
cursor:pointer;

}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">
Захожье Admin
</div>

<div class="menu-item" onclick="openPage('map')">
🗺 Карта участков
</div>

<div class="menu-item" onclick="openPage('residents')">
👥 Жители
</div>

<div class="menu-item" onclick="openPage('stats')">
📊 Аналитика
</div>

<div class="menu-item" onclick="openPage('docs')">
📁 Документы
</div>

<div class="menu-item" onclick="openPage('settings')">
⚙ Настройки
</div>

</div>


<div class="content" id="content">

<h1>Админ панель проекта Захожье</h1>

<p>Выберите раздел слева</p>

</div>


<script>

function openPage(page){

let content = document.getElementById("content")

if(page=="map"){

content.innerHTML = `
<h2>Карта участков</h2>

<div class="card">
<button onclick="openMap()">Открыть карту</button>
</div>
`

}

if(page=="residents"){

content.innerHTML = `
<h2>База жителей</h2>

<div class="card">
Здесь будет список жителей
</div>
`

}

if(page=="stats"){

content.innerHTML = `
<h2>Аналитика</h2>

<div class="card">
Статистика проекта
</div>
`

}

if(page=="docs"){

content.innerHTML = `
<h2>Документы</h2>

<div class="card">
Документы проекта
</div>
`

}

if(page=="settings"){

content.innerHTML = `
<h2>Настройки</h2>

<div class="card">
Настройки системы
</div>
`

}

}

function openMap(){

window.location="/?token="+getToken()

}

function getToken(){

const urlParams = new URLSearchParams(window.location.search)
return urlParams.get('token')

}

</script>

</body>
</html>
